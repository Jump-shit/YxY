<script>
const foods = [
  { name: "奶茶", price: 1, desc: "香甜顺滑", img: "images/milk-tea.jpg" },
  { name: "炸鸡", price: 1, desc: "外酥里嫩", img: "images/fried-chicken.jpg" },
  { name: "寿司", price: 1, desc: "新鲜美味", img: "images/sushi.jpg" },
  { name: "火锅", price: 1, desc: "暖心暖胃", img: "images/hotpot.jpg" },
  { name: "蛋糕", price: 1, desc: "甜甜幸福", img: "images/cake.jpg" },
  { name: "水果", price: 1, desc: "健康清爽", img: "images/fruits.jpg" }
];

let cart = {}; // 存每个商品数量

const menu = document.getElementById("menu");

function render() {
  menu.innerHTML = "";

  foods.forEach((food, index) => {
    const count = cart[index] || 0;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${food.img}" alt="">
      <div class="info">
        <div class="title">${food.name}</div>
        <div class="desc">${food.desc}</div>
        <div class="price">￥${food.price}</div>
        <div style="margin-top:6px;">
          <button onclick="removeItem(${index})">-</button>
          <span style="margin:0 10px;">${count}</span>
          <button onclick="addItem(${index})">+</button>
        </div>
      </div>
    `;

    menu.appendChild(div);
  });

  updateTotal();
}

function addItem(index) {
  cart[index] = (cart[index] || 0) + 1;
  render();
}

function removeItem(index) {
  if (!cart[index]) return;
  cart[index]--;
  if (cart[index] <= 0) delete cart[index];
  render();
}

function updateTotal() {
  let total = 0;

  for (let index in cart) {
    total += cart[index] * foods[index].price;
  }

  document.getElementById("total").innerText = total;
}

function checkout() {
  let summary = "";

  for (let index in cart) {
    const food = foods[index];
    summary += `${food.name} x ${cart[index]}\n`;
  }

  alert("❤️ 已下单成功！\n\n" + summary + "\n总金额：￥" + document.getElementById("total").innerText);
}

render();
</script>
